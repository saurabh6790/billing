<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cloud Billing</title>
    {% for href in css_files %}<link rel="stylesheet" href="{{ href }}" />
    {% endfor %}
  </head>
  <body>
    <div id="app"></div>
    <script>
      window.csrf_token = "{{ frappe.session.csrf_token if frappe.session else '' }}";
      window.site_name = "{{ site_name }}";
      window.socketio_port = "{{ socketio_port }}";
    </script>
    {% for src in js_files %}<script type="module" src="{{ src }}"></script>
    {% endfor %}
  </body>
</html>
